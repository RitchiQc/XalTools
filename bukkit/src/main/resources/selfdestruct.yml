# Timer update frequency in ticks (20 ticks = 1 second)
# RECOMMENDED: 20 for a visual per-second countdown
timer_update_frequency: 20

# Item lore formatting
lore:
  self_destruct_prefix: "&8Self Destruct: "
  timer_prefix: "&8"

# Time format in lore
time_format:
  days_format: "%dd "
  hours_format: "%dh "
  minutes_format: "%dm "
  seconds_format: "%ds"
  empty_format: "Broken"
