# Timer update frequency in ticks (20 ticks = 1 second)
# RECOMMENDED: 20 for a visual per-second countdown
timer_update_frequency: 20

# Item lore formatting
lore:
  self_destruct_prefix: "&cSelf Destruct: "
  timer_prefix: "&e"
  date_format: "dd/MM/yyyy HH:mm"

# Timezone for displaying expiration dates (Java timezone ID)
# Default: America/New_York
# Examples: America/Los_Angeles, Europe/Paris, Asia/Tokyo, UTC
timezone: "America/New_York"

# Time format in lore (used for delayed items and legacy items)
time_format:
  days_format: "%dd "
  hours_format: "%dh "
  minutes_format: "%dm "
  seconds_format: "%ds"
  empty_format: "Broken"
